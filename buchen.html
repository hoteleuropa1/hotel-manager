<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Zimmer buchen - Hotel Europa</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F5F3EF;color:#2C2C2C}
.wrap{max-width:900px;margin:0 auto;padding:20px}
h1{font-size:26px;font-weight:800;color:#58585A;margin-bottom:4px}
h2{font-size:20px;font-weight:700;color:#58585A;margin-bottom:16px}
.sub{font-size:14px;color:#7A7A7A;margin-bottom:24px}
.steps{display:flex;gap:8px;margin-bottom:28px}
.step{flex:1;padding:10px;border-radius:10px;text-align:center;font-size:13px;font-weight:600;background:#DDD9D2;color:#7A7A7A;transition:all .2s}
.step.active{background:#58585A;color:#fff}
.step.done{background:#8B7D6B;color:#fff}
.card{background:#fff;border-radius:14px;border:1px solid #DDD9D2;overflow:hidden;margin-bottom:16px;transition:all .15s}
.card:hover{border-color:#8B7D6B;box-shadow:0 4px 12px rgba(139,125,107,.15)}
.card.selected{border:2px solid #8B7D6B;box-shadow:0 4px 16px rgba(139,125,107,.2)}
.card-body{padding:20px}
.cat-name{font-size:18px;font-weight:700;color:#2C2C2C;margin-bottom:4px}
.cat-info{font-size:13px;color:#7A7A7A;margin-bottom:8px}
.cat-price{font-size:22px;font-weight:800;color:#58585A}
.cat-price span{font-size:14px;font-weight:500;color:#7A7A7A}
.cat-img{width:100%;height:180px;object-fit:cover;background:#DDD9D2;display:flex;align-items:center;justify-content:center;color:#9CA3AF;font-size:14px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
label{display:block;font-size:12px;font-weight:600;color:#58585A;margin-bottom:4px}
input,select{width:100%;padding:10px 14px;border:1px solid #CBC6BE;border-radius:10px;font-size:14px;outline:none;font-family:inherit;box-sizing:border-box;background:#fff}
input:focus,select:focus{border-color:#8B7D6B;box-shadow:0 0 0 3px rgba(139,125,107,.15)}
.field{margin-bottom:14px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 28px;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;transition:all .15s;width:100%}
.btn-primary{background:#8B7D6B;color:#fff}.btn-primary:hover{background:#74685A}
.btn-ghost{background:#fff;color:#7A7A7A;border:1px solid #CBC6BE}.btn-ghost:hover{background:#F5F3EF}
.btn:disabled{opacity:.5;cursor:not-allowed}
.price-box{background:#EDEAE4;border-radius:12px;padding:20px;margin:16px 0}
.price-total{font-size:28px;font-weight:800;color:#58585A}
.price-detail{font-size:13px;color:#7A7A7A}
.price-line{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:14px}
.price-line.total{border-top:2px solid #CBC6BE;margin-top:8px;padding-top:10px}
.avail{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.avail.yes{background:#D1FAE5;color:#059669}
.avail.no{background:#FEE2E2;color:#DC2626}
.success-box{text-align:center;padding:60px 20px}
.success-icon{width:80px;height:80px;border-radius:40px;background:#8B7D6B;display:inline-flex;align-items:center;justify-content:center;margin-bottom:20px;font-size:40px;color:#fff}
.footer{background:#ABA596;border-radius:12px;padding:20px;color:#fff;font-size:13px;margin-top:24px}
.footer a{color:#fff}
.not-avail{opacity:.5;pointer-events:none}
.qty{display:inline-flex;align-items:center;gap:0;border:1px solid #CBC6BE;border-radius:10px;overflow:hidden}
.qty button{width:38px;height:38px;border:none;background:#EDEAE4;font-size:20px;font-weight:700;cursor:pointer;color:#58585A;display:flex;align-items:center;justify-content:center}
.qty button:hover{background:#DDD9D2}
.qty button:disabled{opacity:.3;cursor:not-allowed}
.qty .count{width:40px;text-align:center;font-size:16px;font-weight:700;background:#fff;height:38px;line-height:38px}
.cap-bar{background:#EDEAE4;border-radius:10px;padding:14px 18px;margin:16px 0;font-size:14px;color:#58585A}
.cap-bar.ok{background:#D1FAE5;color:#059669}
.cap-bar.warn{background:#FEF3C7;color:#92400E}
.agb-box{background:#fff;border:1px solid #CBC6BE;border-radius:12px;margin:16px 0;padding:18px;font-size:13px;color:#58585A;line-height:1.7}
.agb-box h3{font-size:14px;font-weight:700;color:#58585A;margin:12px 0 6px}
.agb-box h3:first-child{margin-top:0}
.agb-box ul{margin:0 0 8px 18px}
.agb-box li{margin-bottom:4px}
.check-row{display:flex;align-items:flex-start;gap:10px;margin:14px 0 4px;padding:12px 16px;background:#EDEAE4;border-radius:10px}
.check-row input[type=checkbox]{width:18px;height:18px;margin-top:2px;accent-color:#8B7D6B;flex-shrink:0}
.check-row label{font-size:13px;font-weight:500;color:#58585A;margin-bottom:0;cursor:pointer}
.breakfast-row{display:flex;align-items:flex-start;gap:10px;margin:10px 0;padding:12px 16px;background:#F5F3EF;border:1px solid #DDD9D2;border-radius:10px}
.breakfast-row input[type=checkbox]{width:18px;height:18px;margin-top:2px;accent-color:#8B7D6B;flex-shrink:0}
.breakfast-row label{font-size:14px;font-weight:500;color:#58585A;margin-bottom:0;cursor:pointer}
.compare{background:#FEF9F0;border:1px solid #E8D5B0;border-radius:10px;padding:10px 14px;margin:10px 0 4px;font-size:13px}
.compare .old{text-decoration:line-through;color:#DC2626;font-weight:600}
.compare .new{color:#059669;font-weight:800;font-size:15px}
.compare .save{background:#D1FAE5;color:#059669;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700;margin-left:6px}
.loading-comp{font-size:12px;color:#7A7A7A;font-style:italic;margin-top:6px}
@media(max-width:600px){.grid2,.grid3{grid-template-columns:1fr}.wrap{padding:12px}}
</style>
</head>
<body>
<div class="wrap" id="app">Laden...</div>
<script>
var SB_URL="https://ztdtkncoyrkvdpytwuhy.supabase.co";
var SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp0ZHRrbmNveXJrdmRweXR3dWh5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MDk4OTYsImV4cCI6MjA5MDA4NTg5Nn0.dS6lxpphLtzoKvYNkc5I_otoGSHu99o42gT9q0By61o";

var HN="Hotel Europa";
var HA="Marktplatz 1, 65428 Ruesselsheim";
var HP="015903081422";
var HE="info@hotel-europa-ruesselsheim.de";
var HW="www.hotel-europa-ruesselsheim.de";
var LOGO="https://pms.hotel-europa-ruesselsheim.de/logo-header.jpg";
var BF_PRICE=14;

var state={step:1,cats:[],rooms:[],reservations:[],dailyPrices:{},selections:{},checkIn:"",checkOut:"",adults:1,children:0,breakfast:false,salutation:"Herr",first_name:"",last_name:"",email:"",phone:"",address:"",zip:"",city:"",country:"DE",company:"",agbAccepted:false,loading:true,saving:false,error:"",resNumber:"",resNumbers:[],compPrices:[],compLoading:false};

function sb(path,method,body){
  var opts={method:method||"GET",headers:{"Content-Type":"application/json","apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY}};
  if(method==="POST"||method==="PATCH")opts.headers["Prefer"]="return=representation";
  if(body)opts.body=JSON.stringify(body);
  return fetch(SB_URL+"/rest/v1/"+path,opts).then(function(r){if(!r.ok)throw new Error(r.status);return r.json()});
}

function fd(d){var t=new Date(d);return t.getDate().toString().padStart(2,"0")+"."+(t.getMonth()+1).toString().padStart(2,"0")+"."+t.getFullYear()}
function nights(){if(!state.checkIn||!state.checkOut)return 0;return Math.max(0,Math.round((new Date(state.checkOut)-new Date(state.checkIn))/864e5))}
function esc(s){return(s||"").replace(/"/g,"&quot;").replace(/</g,"&lt;")}
function totalGuests(){return state.adults+state.children}

function getPriceForDate(catId,dateStr){
  var key=catId+"_"+dateStr;
  if(state.dailyPrices[key])return state.dailyPrices[key];
  var cat=state.cats.find(function(c){return c.id===catId});
  return cat?cat.base_price:0;
}

function catNightlyTotal(catId){
  var t=0;var n=nights();
  for(var i=0;i<n;i++){
    var d=new Date(state.checkIn);d.setDate(d.getDate()+i);
    var ds=d.getFullYear()+"-"+(d.getMonth()+1).toString().padStart(2,"0")+"-"+d.getDate().toString().padStart(2,"0");
    t+=getPriceForDate(catId,ds);
  }
  return t;
}

function catAvgNight(catId){
  var n=nights();
  if(n<=0)return 0;
  return Math.round(catNightlyTotal(catId)/n);
}

function roomsPrice(){
  var t=0;
  Object.keys(state.selections).forEach(function(catId){
    t+=catNightlyTotal(catId)*state.selections[catId];
  });
  return t;
}

function breakfastTotal(){
  if(!state.breakfast)return 0;
  return totalGuests()*BF_PRICE*nights();
}

function totalPrice(){return roomsPrice()+breakfastTotal()}

function totalCapacity(){
  var c=0;
  Object.keys(state.selections).forEach(function(catId){
    var cat=state.cats.find(function(cc){return cc.id===catId});
    if(cat)c+=cat.capacity*state.selections[catId];
  });
  return c;
}

function totalRoomsSelected(){
  var c=0;Object.keys(state.selections).forEach(function(k){c+=state.selections[k]});return c;
}

function availableRoomsForCat(catId){
  if(!state.checkIn||!state.checkOut)return[];
  var catRooms=state.rooms.filter(function(r){return r.unit_type_id===catId&&r.active});
  return catRooms.filter(function(room){
    return!state.reservations.some(function(res){
      return res.room_id===room.id&&res.status!=="abgelehnt"&&res.status!=="storniert"&&res.status!=="checkedout"&&state.checkIn<res.check_out&&state.checkOut>res.check_in;
    });
  });
}

function matchCompPrice(catName){
  if(!state.compPrices||!state.compPrices.length)return null;
  var name=(catName||"").toLowerCase().replace(/[^a-z0-9äöü]/g,"");
  var keywords={
    einzel:["einzel","single","ez"],
    doppel:["doppel","double","twin","dz"],
    drei:["drei","triple","dreibett","dbz"],
    vier:["vier","quad","vierbett","family","famili"]
  };
  var myGroup=null;
  Object.keys(keywords).forEach(function(g){
    keywords[g].forEach(function(kw){if(name.indexOf(kw)>=0)myGroup=g});
  });
  for(var i=0;i<state.compPrices.length;i++){
    var cp=state.compPrices[i];
    var cn=(cp.category_name||cp.category||"").toLowerCase().replace(/[^a-z0-9äöü]/g,"");
    if(cn===name)return cp;
    if(myGroup){
      var match=false;
      keywords[myGroup].forEach(function(kw){if(cn.indexOf(kw)>=0)match=true});
      if(match)return cp;
    }
  }
  return null;
}

function fetchCompetitorPrices(){
  state.compLoading=true;state.compPrices=[];render();
  fetch("/api/competitor-prices?check_in="+state.checkIn+"&check_out="+state.checkOut)
    .then(function(r){return r.json()})
    .then(function(data){
      state.compPrices=data.prices||[];
      state.compLoading=false;render();
    })
    .catch(function(){
      state.compLoading=false;render();
    });
}

// === LOAD DAILY PRICES FOR SELECTED DATE RANGE ===
function loadDailyPricesForRange(){
  if(!state.checkIn||!state.checkOut)return;
  sb("daily_prices?date=gte."+state.checkIn+"&date=lte."+state.checkOut+"&order=date","GET")
    .then(function(data){
      state.dailyPrices={};
      (data||[]).forEach(function(d){
        state.dailyPrices[d.unit_type_id+"_"+d.date]=d.price;
      });
      render();
    })
    .catch(function(){});
}

function saveStep3(){
  if(state.step!==3)return;
  var el;
  el=document.getElementById("sal");if(el)state.salutation=el.value;
  el=document.getElementById("fn");if(el)state.first_name=el.value;
  el=document.getElementById("ln");if(el)state.last_name=el.value;
  el=document.getElementById("em");if(el)state.email=el.value;
  el=document.getElementById("ph");if(el)state.phone=el.value;
  el=document.getElementById("addr");if(el)state.address=el.value;
  el=document.getElementById("zip");if(el)state.zip=el.value;
  el=document.getElementById("city");if(el)state.city=el.value;
  el=document.getElementById("country");if(el)state.country=el.value;
  el=document.getElementById("comp");if(el)state.company=el.value;
}

function render(){
  var app=document.getElementById("app");
  var n=nights();
  var tg=totalGuests();
  var tc=totalCapacity();
  var tr=totalRoomsSelected();
  var tp=totalPrice();
  var rp=roomsPrice();
  var bp=breakfastTotal();

  var html='<div style="text-align:center;margin-bottom:20px"><img src="'+LOGO+'" style="max-width:300px;width:100%;margin-bottom:12px"/><h1>Zimmer buchen</h1><p class="sub">Direkt buchen &ndash; bester Preis garantiert!</p></div>';

  html+='<div class="steps"><div class="step '+(state.step>=1?(state.step>1?"done":"active"):"")+'">1. Zeitraum</div><div class="step '+(state.step>=2?(state.step>2?"done":"active"):"")+'">2. Zimmer</div><div class="step '+(state.step>=3?(state.step>3?"done":"active"):"")+'">3. Ihre Daten</div><div class="step '+(state.step>=4?"active":"")+'">4. Fertig</div></div>';

  if(state.loading){html+='<div style="text-align:center;padding:40px;color:#7A7A7A">Laden...</div>';app.innerHTML=html;return}

  // === STEP 1 ===
  if(state.step===1){
    var today=new Date().toISOString().split("T")[0];
    var tomorrow=new Date(Date.now()+864e5).toISOString().split("T")[0];
    html+='<h2>Wann m&ouml;chten Sie reisen?</h2>';
    html+='<div class="grid2"><div class="field"><label>Anreise</label><input type="date" id="ci" value="'+(state.checkIn||today)+'" min="'+today+'"/></div><div class="field"><label>Abreise</label><input type="date" id="co" value="'+(state.checkOut||tomorrow)+'" min="'+tomorrow+'"/></div></div>';
    html+='<div class="grid2"><div class="field"><label>Erwachsene</label><select id="ad">';
    for(var i=1;i<=8;i++)html+='<option value="'+i+'"'+(state.adults===i?" selected":"")+'>'+i+'</option>';
    html+='</select></div><div class="field"><label>Kinder</label><select id="ch">';
    for(var i=0;i<=6;i++)html+='<option value="'+i+'"'+(state.children===i?" selected":"")+'>'+i+'</option>';
    html+='</select></div></div>';
    html+='<button class="btn btn-primary" onclick="goStep2()">Verf&uuml;gbarkeit pr&uuml;fen</button>';
  }

  // === STEP 2 ===
  if(state.step===2){
    html+='<h2>Zimmer w&auml;hlen: '+fd(state.checkIn)+' &ndash; '+fd(state.checkOut)+' ('+n+' '+(n===1?"Nacht":"N&auml;chte")+')</h2>';
    html+='<p style="font-size:14px;color:#58585A;margin-bottom:16px">'+tg+' '+(tg===1?"Gast":"G&auml;ste")+' &ndash; bitte w&auml;hlen Sie passende Zimmer:</p>';

    state.cats.forEach(function(cat){
      var avail=availableRoomsForCat(cat.id);
      var isAvail=avail.length>0;
      var sel=state.selections[cat.id]||0;
      var catTotal=catNightlyTotal(cat.id);
      var avgNight=catAvgNight(cat.id);
      var comp=matchCompPrice(cat.name);

      html+='<div class="card'+(sel>0?" selected":"")+(isAvail?"":" not-avail")+'">';
      html+='<div class="cat-img" style="'+(cat.image_url?"background-image:url("+cat.image_url+");background-size:cover;background-position:center":"")+'">'+(!cat.image_url?cat.name:"")+'</div>';
      html+='<div class="card-body"><div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px"><div style="flex:1;min-width:200px"><div class="cat-name">'+cat.name+'</div><div class="cat-info">Max. '+cat.capacity+' '+(cat.capacity===1?"Person":"Personen")+' pro Zimmer</div>';
      html+='<div style="margin-top:6px"><span class="avail '+(isAvail?"yes":"no")+'">'+(isAvail?avail.length+" verf&uuml;gbar":"Ausgebucht")+'</span></div>';

      // Competitor price comparison - compare against our average nightly rate
      if(comp&&comp.price_per_night>0){
        var directPrice=avgNight>0?avgNight:cat.base_price;
        var bookingPrice=parseFloat(comp.price_per_night);
        if(bookingPrice>directPrice){
          var saving=Math.round(bookingPrice-directPrice);
          var savePct=Math.round((saving/bookingPrice)*100);
          html+='<div class="compare">';
          html+='<span class="old">Booking.com: '+bookingPrice.toFixed(0)+' &euro;/Nacht</span><br>';
          html+='<span class="new">Direktpreis: '+directPrice+' &euro;/Nacht</span>';
          html+='<span class="save">&minus;'+saving+' &euro; ('+savePct+'%)</span>';
          html+='</div>';
        } else if(bookingPrice===directPrice){
          html+='<div class="compare" style="background:#D1FAE5;border-color:#A7F3D0">Gleicher Preis wie Booking.com &ndash; ohne Umweg direkt buchen!</div>';
        }
      } else if(state.compLoading){
        html+='<div class="loading-comp">Preisvergleich wird geladen...</div>';
      }

      html+='</div>';
      html+='<div style="text-align:right">';
      // Show average nightly price (uses daily_prices when available)
      html+='<div class="cat-price">'+avgNight+' EUR <span>/ Nacht</span></div>';
      if(avgNight!==cat.base_price)html+='<div style="font-size:11px;color:#7A7A7A;text-decoration:line-through">Basis: '+cat.base_price+' EUR</div>';
      if(n>0)html+='<div style="font-size:13px;color:#7A7A7A;margin-top:2px">'+catTotal+' EUR / '+n+' '+(n===1?"Nacht":"N&auml;chte")+'</div>';
      if(isAvail){
        html+='<div style="margin-top:10px"><div class="qty">';
        html+='<button onclick="addRoom(\''+cat.id+'\',-1)"'+(sel<=0?" disabled":"")+'>&#8722;</button>';
        html+='<div class="count">'+sel+'</div>';
        html+='<button onclick="addRoom(\''+cat.id+'\',1)"'+(sel>=avail.length?" disabled":"")+'>+</button>';
        html+='</div></div>';
      }
      html+='</div></div></div></div>';
    });

    if(tr>0){
      var capOk=tc>=tg;
      html+='<div class="cap-bar '+(capOk?"ok":"warn")+'">';
      html+='<strong>'+tr+' Zimmer gew&auml;hlt</strong> &ndash; Kapazit&auml;t: '+tc+' '+(tc===1?"Platz":"Pl&auml;tze")+' f&uuml;r '+tg+' '+(tg===1?"Gast":"G&auml;ste");
      if(!capOk)html+='<br><span style="font-size:12px">Bitte w&auml;hlen Sie weitere Zimmer &ndash; es fehlen noch '+(tg-tc)+' '+(tg-tc===1?"Platz":"Pl&auml;tze")+'.</span>';
      if(capOk)html+=' &#10003;';
      html+='</div>';

      html+='<div class="breakfast-row"><input type="checkbox" id="bf"'+(state.breakfast?" checked":"")+' onchange="toggleBreakfast()"/><label for="bf">Fr&uuml;hst&uuml;ck dazubuchen ('+BF_PRICE+' &euro; pro Person / Nacht)'+(state.breakfast?" &ndash; <strong>"+bp+" EUR</strong>":"")+'</label></div>';

      html+='<div class="price-box">';
      html+='<div class="price-line"><span>'+tr+' Zimmer &times; '+n+' '+(n===1?"Nacht":"N&auml;chte")+'</span><span><strong>'+rp+' EUR</strong></span></div>';
      if(state.breakfast)html+='<div class="price-line"><span>Fr&uuml;hst&uuml;ck ('+tg+' Pers. &times; '+n+' '+(n===1?"Tag":"Tage")+')</span><span><strong>'+bp+' EUR</strong></span></div>';
      html+='<div class="price-line total"><span>Gesamtpreis</span><span class="price-total">'+tp+' EUR</span></div>';
      html+='</div>';
    }

    var canProceed=tr>0&&tc>=tg;
    html+='<div style="display:flex;gap:12px;margin-top:16px"><button class="btn btn-ghost" onclick="goBack(1)">Zur&uuml;ck</button><button class="btn btn-primary"'+(canProceed?"":" disabled")+' onclick="goStep3()">Weiter</button></div>';
  }

  // === STEP 3 ===
  if(state.step===3){
    html+='<h2>Ihre Daten</h2>';

    html+='<div class="price-box">';
    var selCats=[];
    Object.keys(state.selections).forEach(function(catId){
      var cnt=state.selections[catId];if(cnt<=0)return;
      var cat=state.cats.find(function(c){return c.id===catId});
      if(cat)selCats.push({cat:cat,count:cnt});
    });
    selCats.forEach(function(sc){
      html+='<div class="price-line"><span>'+sc.count+'&times; '+sc.cat.name+'</span><span>'+catNightlyTotal(sc.cat.id)*sc.count+' EUR</span></div>';
    });
    if(state.breakfast)html+='<div class="price-line"><span>Fr&uuml;hst&uuml;ck ('+tg+' Pers.)</span><span>'+bp+' EUR</span></div>';
    html+='<div class="price-line"><span style="color:#7A7A7A">'+fd(state.checkIn)+' &ndash; '+fd(state.checkOut)+' | '+n+' '+(n===1?"Nacht":"N&auml;chte")+' | '+state.adults+' Erw.'+(state.children>0?", "+state.children+" Kind.":"")+'</span></div>';
    html+='<div class="price-line total"><span>Gesamtpreis</span><span class="price-total">'+tp+' EUR</span></div>';
    html+='</div>';

function addRoom(catId,delta){
  var cur=state.selections[catId]||0;
  var avail=availableRoomsForCat(catId);
  var next=Math.max(0,Math.min(avail.length,cur+delta));
  if(next===0){delete state.selections[catId]}else{state.selections[catId]=next}
  render();
}

function toggleBreakfast(){state.breakfast=!state.breakfast;render()}

function goStep2(){
  state.checkIn=document.getElementById("ci").value;
  state.checkOut=document.getElementById("co").value;
  state.adults=parseInt(document.getElementById("ad").value)||1;
  state.children=parseInt(document.getElementById("ch").value)||0;
  if(!state.checkIn||!state.checkOut||state.checkIn>=state.checkOut){alert("Bitte gueltigen Zeitraum waehlen");return}
  state.step=2;state.selections={};state.breakfast=false;
  // Load daily prices for the selected date range
  loadDailyPricesForRange();
  render();
  fetchCompetitorPrices();
}

function goStep3(){
  if(totalRoomsSelected()<=0||totalCapacity()<totalGuests())return;
  state.step=3;state.error="";render();
}

function goBack(step){state.step=step;state.error="";render()}

function doBook(){
  saveStep3();
  state.agbAccepted=document.getElementById("agbcheck").checked;

  if(!state.agbAccepted){state.error="Bitte akzeptieren Sie die Buchungsbedingungen.";render();return}
  if(!state.first_name.trim()||!state.last_name.trim()){state.error="Bitte Vor- und Nachname eingeben.";render();return}
  if(!state.email.trim()||!state.email.includes("@")){state.error="Bitte g&uuml;ltige E-Mail-Adresse eingeben.";render();return}

  var roomsToBook=[];
  Object.keys(state.selections).forEach(function(catId){
    var cnt=state.selections[catId];
    var avail=availableRoomsForCat(catId);
    for(var i=0;i<cnt&&i<avail.length;i++){
      var cat=state.cats.find(function(c){return c.id===catId});
      roomsToBook.push({room:avail[i],cat:cat,price:catNightlyTotal(catId)});
    }
  });

  if(roomsToBook.length===0){state.error="Keine verf&uuml;gbaren Zimmer im gew&auml;hlten Zeitraum.";render();return}

  state.saving=true;state.error="";render();

  var guestData={salutation:state.salutation,first_name:state.first_name.trim(),last_name:state.last_name.trim(),email:state.email.trim(),phone:state.phone.trim(),address:state.address.trim(),zip:state.zip.trim(),city:state.city.trim(),country:state.country.trim()||"DE"};
  if(state.company.trim())guestData.company=state.company.trim();

  sb("guests","POST",guestData).then(function(gs){
    var guest=gs[0];
    var bfNote=state.breakfast?" | Fruehstueck: Ja ("+totalGuests()+" Pers.)":"";
    var groupNote=roomsToBook.length>1?" | Gruppenbuchung ("+roomsToBook.length+" Zimmer)":"";

    var promises=roomsToBook.map(function(rb,idx){
      var token="xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g,function(c){var r=Math.random()*16|0;return(c==="x"?r:(r&3|8)).toString(16)});
      return sb("reservations","POST",{
        room_id:rb.room.id,guest_id:guest.id,check_in:state.checkIn,check_out:state.checkOut,
        status:"reservierung",adults:idx===0?state.adults:0,children:idx===0?state.children:0,
        total_price:rb.price+(idx===0?breakfastTotal():0),source:"website",offer_token:token,
        notes:"Online-Direktbuchung"+bfNote+groupNote
      });
    });

    return Promise.all(promises).then(function(results){
      state.resNumbers=results.map(function(rs){return rs[0].reservation_number||rs[0].id.toString().slice(0,8).toUpperCase()});
      state.resNumber=state.resNumbers[0];
      // Email an Gast
      var guestEmailPromise=fetch("/api/send-email",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({
        to:state.email.trim(),subject:"Ihre Reservierungsbestaetigung - "+HN,
        html:buildConfirmationHtml(guest),emailType:"bestaetigung"
      })}).catch(function(){});
      // Kopie an Hotel
      var hotelEmailPromise=fetch("/api/send-email",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({
        to:"info@hotel-europa-ruesselsheim.de",subject:"Neue Website-Buchung: "+state.first_name+" "+state.last_name+" ("+fd(state.checkIn)+" - "+fd(state.checkOut)+")",
        html:buildHotelNotificationHtml(guest),emailType:"hotel-notification"
      })}).catch(function(){});
      return Promise.all([guestEmailPromise,hotelEmailPromise]);
    });
  }).then(function(){
    state.saving=false;state.step=4;render();
  }).catch(function(e){
    state.saving=false;state.error="Buchungsfehler: "+e.message;render();
  });
}

function resetBooking(){
  state={step:1,cats:state.cats,rooms:state.rooms,reservations:state.reservations,dailyPrices:{},selections:{},checkIn:"",checkOut:"",adults:1,children:0,breakfast:false,salutation:"Herr",first_name:"",last_name:"",email:"",phone:"",address:"",zip:"",city:"",country:"DE",company:"",agbAccepted:false,loading:false,saving:false,error:"",resNumber:"",resNumbers:[],compPrices:[],compLoading:false};
  loadData();
}

function loadData(){
  state.loading=true;render();
  Promise.all([
    sb("unit_types?order=sort_order","GET"),
    sb("rooms?active=eq.true&order=name","GET"),
    sb("reservations?status=neq.storniert&status=neq.abgelehnt&status=neq.checkedout&select=id,room_id,check_in,check_out,status","GET")
  ]).then(function(results){
    state.cats=results[0];state.rooms=results[1];state.reservations=results[2];
    state.loading=false;render();
  }).catch(function(e){
    state.loading=false;state.error="Laden fehlgeschlagen: "+e.message;render();
  });
}

loadData();
