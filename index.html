const freeRooms=useMemo(()=>{if(!fm.check_in||!fm.check_out)return[];const selIds=new Set(selectedRooms.map(sr=>sr.room.id));return(allRooms||[]).filter(r=>{if(selIds.has(r.id))return false;return!(allRess||[]).some(rv=>rv.room_id===r.id&&fm.check_in<rv.check_out&&fm.check_out>rv.check_in&&rv.status!=="storniert"&&rv.status!=="abgelehnt"&&rv.status!=="checkedout")})},[fm.check_in,fm.check_out,selectedRooms,allRooms,allRess]);

const save=async()=>{if(!isFirma&&(!fm.first_name||!fm.last_name))return;if(isFirma&&!fm.company)return;setSv(true);try{let gid=existingGuestId;if(!gid){const gd={salutation:fm.salutation,first_name:fm.first_name||"",last_name:fm.last_name||"",email:fm.email||"",phone:fm.phone||"",address:fm.address||"",zip:fm.zip||"",city:fm.city||"",country:fm.country||"DE"};if(isFirma)gd.company=fm.company||"";const[g]=await api.post("guests",gd);gid=g.id}const groupId=selectedRooms.length>1?"xxxxxxxx".replace(/x/g,()=>Math.floor(Math.random()*16).toString(16)):"";for(let i=0;i<selectedRooms.length;i++){const sr=selectedRooms[i];const otoken="xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g,function(c){var r=Math.random()*16|0;return(c==="x"?r:(r&0x3|0x8)).toString(16)});const srN=Math.max(1,dBet(sr.checkIn||fm.check_in,sr.checkOut||fm.check_out));const roomTotal=srN*sr.price;let notes=fm.notes||"";if(groupId)notes=(notes?notes+" | ":"")+"Gruppe "+groupId+" (Zi "+(i+1)+"/"+selectedRooms.length+")";await api.post("reservations",{room_id:sr.room.id,guest_id:gid,check_in:sr.checkIn||fm.check_in,check_out:sr.checkOut||fm.check_out,status:"angebot",adults:fm.adults,children:fm.children,total_price:roomTotal,notes,source:fm.source,offer_token:otoken,sold_as_unit_type_id:sr.soldAsUtId||sr.room.unit_type_id}).then(async([newRes])=>{if(i===0){for(const sp of selectedProducts){let qty=1,up=parseFloat(sp.price);if(sp.unit==="pro Nacht")qty=nights;if(sp.unit==="pro Person/Nacht")qty=nights*(fm.adults||1);if(sp.unit==="pro Person")qty=fm.adults||1;await api.post("reservation_items",{reservation_id:newRes.id,item_type:"product",product_id:sp.id,description:sp.name,quantity:qty,unit_price:up,total_price:qty*up})}}if(sr.guestNames){for(let gi=0;gi<sr.guestNames.length;gi++){const gname=(sr.guestNames[gi]||"").trim();if(gname){const pts=gname.split(/\s+/);await api.post("room_occupants",{reservation_id:newRes.id,first_name:pts[0]||"",last_name:pts.slice(1).join(" ")||"",occupant_number:gi+1} const AufgabenView=()=>{const[newTask,setNewTask]=useState("");const[newDue,setNewDue]=useState("");const[selRes,setSelRes]=useState(null);const[selRes2,setSelRes2]=useState(null);const[addPayModal,setAddPayModal]=useState(null);const[editPayModal,setEditPayModal]=useState(null);const[cicoDate,setCicoDate]=useState(toDS(new Date()));

{sel&&<Modal title={(sel.company?sel.company+": ":"")+(sel.first_name||"")+" "+(sel.last_name||"")} onClose={()=>{setSel(null);load()}} width={560}><GuestEditForm guest={sel} api={api} ress={ress} riMap={riMap} aRms={rms} uts={uts} onSave={()=>{setSel(null);load();show("Gast gespeichert")}} onClose={()=>setSel(null)} showToast={show}/></Modal>}

const GuestEditForm=({guest,api,ress,riMap,aRms,uts,onSave,onClose,showToast})=>{const[gf,setGf]=useState({...guest});const[sv,setSv2]=useState(false);const ug=(k,v)=>setGf(p=>({...p,[k]:v}));const doSave=async()=>{setSv2(true);try{await api.patch("guests",guest.id,{salutation:gf.salutation||"",first_name:gf.first_name||"",last_name:gf.last_name||"",company:gf.company||"",email:gf.email||"",phone:gf.phone||"",address:gf.address||"",zip:gf.zip||"",city:gf.city||"",country:gf.country||"DE"});onSave()}catch(e){showToast(e.message,"error")}setSv2(false)};
const guestRess=useMemo(()=>(ress||[]).filter(r=>r.guest_id===guest.id&&r.status!=="storniert"&&r.status!=="abgelehnt").sort((a,b)=>a.check_in.localeCompare(b.check_in)),[ress,guest.id]);
const guestStats=useMemo(()=>{let totalRev=0,totalNights=0;const byMonth={};guestRess.forEach(r=>{const rev=parseFloat(r.total_price||0)+(riMap?.[r.id]||0);totalRev+=rev;const n=Math.max(1,Math.round((new Date(r.check_out)-new Date(r.check_in))/(86400000)));totalNights+=n;const mk=r.check_in.substring(0,7);byMonth[mk]=(byMonth[mk]||0)+rev});const months=Object.keys(byMonth).sort();const maxRev=Math.max(...Object.values(byMonth),1);return{totalRev,totalNights,count:guestRess.length,byMonth,months,maxRev}},[guestRess,riMap]);
return<div><div style={{display:"grid",gridTemplateColumns:"120px 1fr 1fr",gap:12}}><Sel label="Anrede" value={gf.salutation||""} onChange={e=>ug("salutation",e.target.value)}>{SALUTATIONS.map(s=><option key={s} value={s}>{s||"-"}</option>)}</Sel><Inp label="Vorname" value={gf.first_name||""} onChange={e=>ug("first_name",e.target.value)}/><Inp label="Nachname" value={gf.last_name||""} onChange={e=>ug("last_name",e.target.value)}/></div><Inp label="Firma" value={gf.company||""} onChange={e=>ug("company",e.target.value)}/><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}><Inp label="E-Mail" value={gf.email||""} onChange={e=>ug("email",e.target.value)}/><Inp label="Telefon" value={gf.phone||""} onChange={e=>ug("phone",e.target.value)}/></div><Inp label="Adresse" value={gf.address||""} onChange={e=>ug("address",e.target.value)}/><div style={{display:"grid",gridTemplateColumns:"120px 1fr 120px",gap:12}}><Inp label="PLZ" value={gf.zip||""} onChange={e=>ug("zip",e.target.value)}/><Inp label="Ort" value={gf.city||""} onChange={e=>ug("city",e.target.value)}/><CountrySel label="Land" value={gf.country||"DE"} onChange={v=>ug("country",v)}/></div><div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:12}}><Btn v="ghost" onClick={onClose}>Abbrechen</Btn><Btn disabled={sv} onClick={doSave}><I n="save" s={14}/> Speichern</Btn></div>
{guestRess.length>0&&<div style={{marginTop:24,borderTop:"1px solid #E5E7EB",paddingTop:20}}>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:20}}><div style={{background:"#F0FDF4",borderRadius:10,padding:"12px 16px",textAlign:"center"}}><div style={{fontSize:22,fontWeight:700,color:"#059669"}}>{fmt(guestStats.totalRev)}</div><div style={{fontSize:11,color:"#6B7280"}}>EUR Umsatz</div></div><div style={{background:"#EFF6FF",borderRadius:10,padding:"12px 16px",textAlign:"center"}}><div style={{fontSize:22,fontWeight:700,color:"#2563EB"}}>{guestStats.count}</div><div style={{fontSize:11,color:"#6B7280"}}>{guestStats.count===1?"Aufenthalt":"Aufenthalte"}</div></div><div style={{background:"#F5F3FF",borderRadius:10,padding:"12px 16px",textAlign:"center"}}><div style={{fontSize:22,fontWeight:700,color:"#7C3AED"}}>{guestStats.totalNights}</div><div style={{fontSize:11,color:"#6B7280"}}>{guestStats.totalNights===1?"Nacht":"Naechte"}</div></div></div>
{guestStats.months.length>1&&<div style={{marginBottom:20}}><div style={{fontSize:12,fontWeight:500,color:"#6B7280",marginBottom:8}}>Umsatz pro Monat</div><div style={{display:"flex",alignItems:"flex-end",gap:3,height:80}}>{guestStats.months.map(m=>{const h=Math.max(8,Math.round(guestStats.byMonth[m]/guestStats.maxRev*70));const parts=m.split("-");return<div key={m} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}><div style={{fontSize:9,color:"#6B7280",fontWeight:500}}>{fmt(guestStats.byMonth[m])}</div><div style={{width:"100%",height:h,background:"#D4940E",borderRadius:"4px 4px 0 0",minWidth:16,opacity:.8}}/><div style={{fontSize:8,color:"#9CA3AF"}}>{MONATE[parseInt(parts[1])-1]?.substring(0,3)} {parts[0].slice(2)}</div></div>})}</div></div>}
<div style={{fontSize:12,fontWeight:500,color:"#6B7280",marginBottom:8}}>Buchungshistorie</div><div style={{maxHeight:200,overflow:"auto"}}>{guestRess.map(r=>{const rm=(aRms||[]).find(x=>x.id===r.room_id);const ut2=rm?(uts||[]).find(u=>u.id===(r.sold_as_unit_type_id||rm.unit_type_id)):null;const rev=parseFloat(r.total_price||0)+(riMap?.[r.id]||0);const n=Math.max(1,Math.round((new Date(r.check_out)-new Date(r.check_in))/(86400000)));const sc=SC[r.status]||{};return<div key={r.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",background:"#F9FAFB",borderRadius:8,marginBottom:4,fontSize:12}}><SrcIcon source={r.source} s={14}/><div style={{flex:1}}><div style={{fontWeight:500}}>Zi. {rm?.name||"?"} {ut2?.name||""} ({n}N.)</div><div style={{color:"#6B7280",fontSize:11}}>{fd(r.check_in)} - {fd(r.check_out)}</div></div><span style={{display:"inline-block",padding:"1px 8px",borderRadius:12,fontSize:10,fontWeight:500,background:sc.bg||"#F3F4F6",color:sc.tx||"#374151"}}>{sc.l||r.status}</span><div style={{fontWeight:600,minWidth:70,textAlign:"right"}}>{fmt(rev)} EUR</div></div>})}</div></div>}
</div>};

// EINSTELLUNGEN
const SettingsView=()=>{const[tab,setTab]=useState("types");const[modal,setModal]=useState(null);const[exp,setExp]=useState({});const[hf,setHf]=useState(hi||{});const[sv,setSv]=useState(false);
const rbt=useMemo(()=>{const m={};uts.forEach(u=>{m[u.id]=rms.filter(r=>r.unit_type_id===u.id)});return m},[uts,rms]);
const tabs=[{id:"types",label:"Einheiten",icon:<I n="layers" s={16}/>},{id:"rooms",label:"Zimmer",icon:<I n="bed" s={16}/>},{id:"hotel",label:"Hoteldaten",icon:<I n="building" s={16}/>}];
return<div><Tab tabs={tabs} active={tab} onChange={setTab}/>
{tab==="types"&&<div><div style={{display:"flex",justifyContent:"space-between",marginBottom:16}}><span style={{color:"#6B7280"}}>{uts.length} Einheiten</span><Btn sz="sm" onClick={()=>setModal({type:"addUT"})}><I n="plus" s={14}/> Neue Einheit</Btn></div>{uts.map(ut=>{const rs=rbt[ut.id]||[];return<div key={ut.id} style={{background:"#fff",borderRadius:12,border:"1px solid #E5E7EB",marginBottom:12}}><div onClick={()=>setExp(p=>({...p,[ut.id]:!p[ut.id]}))} style={{padding:"16px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer"}}><div style={{fontWeight:500}}>{ut.name} ({ut.short_name})</div><div style={{display:"flex",alignItems:"center",gap:12}}><span style={{fontWeight:500}}>{rs.length} Zi.</span><button onClick={e=>{e.stopPropagation();setModal({type:"editUT",ut})}} style={{background:"none",border:"none",cursor:"pointer"}}><I n="edit" s={16} c="#6B7280"/></button><button onClick={e=>{e.stopPropagation();if(rs.length){show("Erst Zimmer entfernen!","error");return}delUT(ut.id)}} style={{background:"none",border:"none",cursor:"pointer"}}><I n="trash" s={16} c="#EF4444"/></button></div></div>{exp[ut.id]&&<div style={{padding:"12px 20px",borderTop:"1px solid #F3F4F6",background:"#FAFAFA"}}>{rs.map(r=><span key={r.id} style={{display:"inline-block",margin:4,padding:"6px 12px",background:"#fff",border:"1px solid #E5E7EB",borderRadius:8,fontSize:12}}>{r.name}</span>)}<div style={{marginTop:8}}><Btn sz="sm" v="ghost" onClick={()=>setModal({type:"addRoom",pre:ut.id})}><I n="plus" s={12}/> Zimmer</Btn></div></div>}</div>})}</div>}
{tab==="rooms"&&<div><Btn sz="sm" onClick={()=>setModal({type:"addRoom"})} style={{marginBottom:16}}><I n="plus" s={14}/> Zimmer</Btn><div style={{background:"#fff",borderRadius:12,border:"1px solid #E5E7EB",overflow:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}><thead><tr style={{background:"#F9FAFB"}}>{["Nr.","Einheit","Etage","Status",""].map(h=><th key={h} style={{padding:"10px 12px",textAlign:"left",fontWeight:500,fontSize:12,color:"#6B7280",borderBottom:"1px solid #E5E7EB"}}>{h}</th>)}</tr></thead><tbody>{rms.sort((a,b)=>a.name.localeCompare(b.name,undefined,{numeric:true})).map(r=>{const ut=gUT(r,uts);return<tr key={r.id} style={{opacity:r.active?1:.5}}><td style={{padding:"10px 12px",fontWeight:500,borderBottom:"1px solid #F3F4F6"}}>{r.name}</td><td style={{padding:"10px 12px",borderBottom:"1px solid #F3F4F6"}}>{ut?.name}</td><td style={{padding:"10px 12px",borderBottom:"1px solid #F3F4F6"}}>{r.floor}.OG</td><td style={{padding:"10px 12px",borderBottom:"1px solid #F3F4F6",color:r.active?"#059669":"#9CA3AF"}}>{r.active?"Aktiv":"Inaktiv"}</td><td style={{padding:"10px 12px",borderBottom:"1px solid #F3F4F6"}}><button onClick={()=>setModal({type:"editRoom",room:r})} style={{background:"none",border:"none",cursor:"pointer",marginRight:4}}><I n="edit" s={15} c="#6B7280"/></button><button onClick={()=>delRoom(r.id)} style={{background:"none",border:"none",cursor:"pointer"}}><I n="trash" s={15} c="#EF4444"/></button></td></tr>})}</tbody></table></div></div>}
{tab==="hotel"&&<div style={{background:"#fff",borderRadius:12,padding:20,border:"1px solid #E5E7EB",maxWidth:500}}><Inp label="Hotelname" value={hf.name||""} onChange={e=>setHf(p=>({...p,name:e.target.value}))}/><Inp label="Adresse" value={hf.address||""} onChange={e=>setHf(p=>({...p,address:e.target.value}))}/><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}><Inp label="Telefon" value={hf.phone||""} onChange={e=>setHf(p=>({...p,phone:e.target.value}))}/><Inp label="E-Mail" value={hf.email||""} onChange={e=>setHf(p=>({...p,email:e.target.value}))}/></div><Btn disabled={sv} onClick={async()=>{setSv(true);try{await api.patch("hotel_info",hi.id,hf);setHi({...hi,...hf});show("Gespeichert")}catch(e){show("Fehler","error")}setSv(false)}}><I n="save" s={14}/> Speichern</Btn></div>}
{modal?.type==="addUT"&&<UTEditor usedColors={uts.map(u=>u.color)} onClose={()=>setModal(null)} onSave={async d=>{await saveUT(d);setModal(null)}}/>}
{modal?.type==="editUT"&&<UTEditor ut={modal.ut} usedColors={uts.map(u=>u.color)} onClose={()=>setModal(null)} onSave={async d=>{await saveUT(d,modal.ut.id);setModal(null)}}/>}
{modal?.type==="addRoom"&&<RoomEditor unitTypes={uts} onClose={()=>setModal(null)} onSave={async d=>{await saveRoom({...d,unit_type_id:modal.pre||d.unit_type_id});setModal(null)}}/>}
{modal?.type==="editRoom"&&<RoomEditor room={modal.room} unitTypes={uts} onClose={()=>setModal(null)} onSave={async d=>{await saveRoom(d,modal.room.id);setModal(null)}}/>}
</div>};

if(ld)return<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#F5F5F7"}}><div style={{textAlign:"center"}}><img src="https://pms.hotel-europa-ruesselsheim.de/logo-header.jpg" style={{maxWidth:"200px",width:"100%",marginBottom:20,opacity:.6}} alt=""/><div><I n="clock" s={28} c="#2563EB" st={{animation:"spin 1s linear infinite"}}/></div></div></div>;
const nav=[{id:"plan",l:"Belegungsplan",ic:"cal"},{id:"preise",l:"Preise",ic:"credit"},{id:"aufgaben",l:"Aufgaben",ic:"check",badge:openTaskCount},{id:"guests",l:"Gaeste",ic:"users"},{id:"settings",l:"Einstellungen",ic:"settings"}];
return<div style={{minHeight:"100vh"}}>
<div className="pms-header" style={{background:"#fff",padding:"10px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8,borderBottom:"1px solid #E5E7EB"}}>
<div style={{display:"flex",alignItems:"center",gap:12}}><img src="https://pms.hotel-europa-ruesselsheim.de/logo-header.jpg" style={{height:36,borderRadius:4}} alt="Hotel Europa"/><div><div style={{fontWeight:500,fontSize:15,color:"#111"}}>{hi?.name||"Hotel"}</div><div style={{fontSize:11,color:"#9CA3AF"}}>{aRms.length} Zimmer</div></div></div>
<div className="pms-header-nav" style={{display:"flex",gap:2,alignItems:"center",flexWrap:"wrap"}}>{nav.map(n=><button key={n.id} onClick={()=>setView(n.id)} style={{display:"flex",alignItems:"center",gap:6,padding:"7px 14px",borderRadius:8,border:"none",background:view===n.id?"#FEF6E7":"transparent",color:view===n.id?"#D4940E":"#9CA3AF",fontWeight:view===n.id?500:400,fontSize:13,cursor:"pointer",position:"relative"}}><I n={n.ic} s={16} c={view===n.id?"#D4940E":"#9CA3AF"}/> {n.l}{n.badge>0&&<span style={{background:"#DC2626",color:"#fff",fontSize:10,fontWeight:700,borderRadius:10,padding:"1px 6px",marginLeft:2,lineHeight:"16px"}}>{n.badge}</span>}</button>)}<button onClick={load} style={{background:"none",border:"none",cursor:"pointer",padding:8}}><I n="refresh" s={16} c="#9CA3AF"/></button><button onClick={onLogout} style={{background:"#F3F4F6",border:"1px solid #E5E7EB",borderRadius:8,cursor:"pointer",padding:"6px 12px",display:"flex",alignItems:"center",gap:6,color:"#6B7280",fontSize:12,fontWeight:500}}><I n="logout" s={14} c="#6B7280"/> Abmelden</button></div>
</div>
<div className="pms-content" style={{padding:20,maxWidth:1400,margin:"0 auto"}}>
{view==="plan"&&<PlanView/>}
{view==="preise"&&<PreiseView/>}
{view==="aufgaben"&&<AufgabenView/>}
{view==="guests"&&<GuestsView/>}
{view==="settings"&&<SettingsView/>}
</div>
</div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
