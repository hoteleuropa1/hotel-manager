function useAPI(url,key,token){
  const h=useCallback(()=>{
    const hd={"Content-Type":"application/json",Prefer:"return=representation"};
    if(key.startsWith("sb_")){hd.apikey=key;if(token)hd.Authorization="Bearer "+token}
    else{hd.apikey=key;hd.Authorization="Bearer "+(token||key)}
    return hd;
  },[key,token]);
  return useMemo(()=>({
    get:async(t,q="")=>{const r=await fetch(url+"/rest/v1/"+t+"?"+q,{headers:h()});if(!r.ok){const b=await r.text();throw new Error(r.status+" "+b.slice(0,200))}return r.json()},
    post:async(t,d)=>{const r=await fetch(url+"/rest/v1/"+t,{method:"POST",headers:h(),body:JSON.stringify(d)});if(!r.ok){const b=await r.text();throw new Error(r.status+" "+b.slice(0,200))}return r.json()},
    patch:async(t,id,d)=>{const r=await fetch(url+"/rest/v1/"+t+"?id=eq."+id,{method:"PATCH",headers:h(),body:JSON.stringify(d)});if(!r.ok){const b=await r.text();throw new Error(r.status+" "+b.slice(0,200))}return r.json()},
    del:async(t,id)=>{const r=await fetch(url+"/rest/v1/"+t+"?id=eq."+id,{method:"DELETE",headers:h()});if(!r.ok){const b=await r.text();throw new Error(r.status+" "+b.slice(0,200))}},
  }),[url,h]);
}

const AuthScreen=({sb,onAuth,onBack})=>{
  const[em,setEm]=useState("");const[pw,setPw]=useState("");const[reg,setReg]=useState(false);
  const[err,setErr]=useState("");const[ld,setLd]=useState(false);const[sp,setSp]=useState(false);
  const go=async()=>{
    if(!em||!pw){setErr("Bitte ausfuellen");return}if(pw.length<6){setErr("Mind. 6 Zeichen");return}
    setLd(true);setErr("");
    try{
      const ep=reg?"/auth/v1/signup":"/auth/v1/token?grant_type=password";
      const hd={"Content-Type":"application/json",apikey:sb.key};
      const r=await fetch(sb.url+ep,{method:"POST",headers:hd,body:JSON.stringify({email:em,password:pw})});
      const d=await r.json();if(d.error||d.msg)throw new Error(d.error_description||d.error||d.msg);
      if(reg&&!d.access_token){setErr("Registrierung erfolgreich! Bitte E-Mail bestaetigen.");setReg(false);setLd(false);return}
      onAuth(d.access_token,d.user);
    }catch(e){setErr(e.message||"Fehler")}setLd(false);
  };
  return<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{background:"#fff",borderRadius:20,padding:40,maxWidth:400,width:"90%",boxShadow:"0 20px 60px rgba(0,0,0,.1)"}}>
    <div style={{textAlign:"center",marginBottom:32}}><div style={{background:"linear-gradient(135deg,#3B82F6,#8B5CF6)",borderRadius:16,width:56,height:56,display:"inline-flex",alignItems:"center",justifyContent:"center",marginBottom:16}}><I n="home" s={28} c="#fff"/></div><h1 style={{fontSize:22,fontWeight:800,marginBottom:4}}>HotelManager</h1><p style={{color:"#6B7280",fontSize:14}}>{reg?"Registrieren":"Anmelden"}</p></div>
    <Inp label="E-Mail" value={em} onChange={e=>setEm(e.target.value)} type="email"/>
    <div style={{marginBottom:20}}><label style={{display:"block",fontSize:12,fontWeight:600,color:"#374151",marginBottom:4}}>Passwort</label><div style={{position:"relative"}}><input value={pw} onChange={e=>setPw(e.target.value)} type={sp?"text":"password"} placeholder="--------" style={{width:"100%",padding:"10px 40px 10px 14px",border:"1px solid #D1D5DB",borderRadius:10,fontSize:14,outline:"none",boxSizing:"border-box"}} onKeyDown={e=>e.key==="Enter"&&go()}/><button onClick={()=>setSp(!sp)} style={{position:"absolute",right:10,top:10,background:"none",border:"none",cursor:"pointer",color:"#9CA3AF"}}><I n={sp?"eyeOff":"eye"} s={18}/></button></div></div>
    {err&&<div style={{background:err.includes("erfolgreich")?"#D1FAE5":"#FEE2E2",color:err.includes("erfolgreich")?"#059669":"#DC2626",padding:"10px 14px",borderRadius:10,fontSize:13,marginBottom:16}}>{err}</div>}
    <button onClick={go} disabled={ld} style={{width:"100%",padding:12,background:"linear-gradient(135deg,#3B82F6,#8B5CF6)",color:"#fff",border:"none",borderRadius:10,fontSize:15,fontWeight:700,cursor:"pointer",marginBottom:12}}>{ld?"...":reg?"Registrieren":"Anmelden"}</button>
    <div style={{display:"flex",justifyContent:"space-between",fontSize:13}}><button onClick={()=>{setReg(!reg);setErr("")}} style={{background:"none",border:"none",color:"#3B82F6",fontWeight:600,cursor:"pointer"}}>{reg?"Login":"Registrieren"}</button></div>
  </div></div>;
};

const ResDetailModal=({res,room,ut,guest,api,allProducts,unitTypes,rooms,hotelInfo:hi,onClose,onRefresh,showToast})=>{
  const[tab,setTab]=useState("res");const[gf,setGf]=useState(guest||{});const[rf,setRf]=useState(res);
  const[items,setItems]=useState([]);const[payments,setPayments]=useState([]);const[saving,setSaving]=useState(false);
  const[addProduct,setAddProduct]=useState(false);const[addPayment,setAddPayment]=useState(false);
  const loadItems=useCallback(async()=>{try{const[it,py]=await Promise.all([api.get("reservation_items","reservation_id=eq."+res.id+"&order=created_at"),api.get("payments","reservation_id=eq."+res.id+"&order=created_at.desc")]);setItems(it);setPayments(py)}catch(e){showToast(e.message,"error")}},[res.id,api]);
  useEffect(()=>{loadItems()},[]);
  const nights=dBet(rf.check_in,rf.check_out);const roomPrice=gP(room,unitTypes);const roomTotal=nights*roomPrice;
  const calcTax=(total,taxType,taxRate,s1p,s1r,s2p,s2r)=>{if(taxType==="gemischt"&&s1p&&s1r!=null&&s2p&&s2r!=null){const g1=total*(s1p/100),g2=total*(s2p/100);const n1=Math.round(g1/(1+s1r/100)*100)/100,n2=Math.round(g2/(1+s2r/100)*100)/100;return{net:n1+n2,tax:total-(n1+n2),gross:total,detail:s1p+"%x"+s1r+"% + "+s2p+"%x"+s2r+"%"}}const r=taxRate||7;const net=Math.round(total/(1+r/100)*100)/100;return{net,tax:total-net,gross:total,detail:r+"%"}};
  const roomTaxInfo=calcTax(roomTotal,"einfach",7);
  const itemsTaxDetails=items.filter(i=>i.item_type==="product").map(it=>{const prod=allProducts.find(p=>p.id===it.product_id);return{...it,taxInfo:calcTax(parseFloat(it.total_price||0),prod?.tax_type||it.tax_type||"einfach",prod?.tax_rate||it.tax_rate||7,prod?.tax_split_1_pct||it.tax_split_1_pct,prod?.tax_split_1_rate||it.tax_split_1_rate,prod?.tax_split_2_pct||it.tax_split_2_pct,prod?.tax_split_2_rate||it.tax_split_2_rate)}});
  const totalNet=roomTaxInfo.net+itemsTaxDetails.reduce((s,i)=>s+i.taxInfo.net,0);const totalTax=roomTaxInfo.tax+itemsTaxDetails.reduce((s,i)=>s+i.taxInfo.tax,0);
  const itemsTotal=items.filter(i=>i.item_type==="product").reduce((s,i)=>s+parseFloat(i.total_price||0),0);const grandTotal=roomTotal+itemsTotal;
  const totalPaid=payments.filter(p=>p.status==="eingegangen").reduce((s,p)=>s+parseFloat(p.amount||0),0);const balance=grandTotal-totalPaid;
  const saveGuest=async()=>{setSaving(true);try{await api.patch("guests",guest.id,gf);showToast("Gast gespeichert")}catch(e){showToast(e.message,"error")}setSaving(false)};
  const saveRes=async()=>{setSaving(true);try{await api.patch("reservations",res.id,{status:rf.status,source:rf.source,check_in:rf.check_in,check_out:rf.check_out,adults:rf.adults,children:rf.children,notes:rf.notes,internal_notes:rf.internal_notes,deposit_required:rf.deposit_required||0,deposit_due:rf.deposit_due,fixed:rf.fixed,total_price:grandTotal});await onRefresh();showToast("Reservierung gespeichert")}catch(e){showToast(e.message,"error")}setSaving(false)};
  const addItem=async(prod)=>{try{let qty=1,up=parseFloat(prod.price);if(prod.unit==="pro Nacht")qty=nights;if(prod.unit==="pro Person/Nacht")qty=nights*(rf.adults||1);if(prod.unit==="pro Person")qty=rf.adults||1;const tp=qty*up;await api.post("reservation_items",{reservation_id:res.id,item_type:"product",product_id:prod.id,description:prod.name,quantity:qty,unit_price:up,total_price:tp});await loadItems();setAddProduct(false);showToast("Produkt hinzugefuegt")}catch(e){showToast(e.message,"error")}};
  const removeItem=async(id)=>{try{await api.del("reservation_items",id);await loadItems();showToast("Entfernt")}catch(e){showToast(e.message,"error")}};
  const addPay=async(pay)=>{try{await api.post("payments",{reservation_id:res.id,guest_id:guest.id,...pay});await loadItems();showToast("Zahlung erfasst")}catch(e){showToast(e.message,"error")}};
  const updateStatus=async(s)=>{try{const x={status:s};if(s==="checkedin")x.checked_in_at=new Date().toISOString();if(s==="checkedout")x.checked_out_at=new Date().toISOString();await api.patch("reservations",res.id,x);setRf(p=>({...p,status:s}));await onRefresh();showToast("Status: "+(SC[s]||{}).l)}catch(e){showToast(e.message,"error")}};
  const u=(k,v)=>setRf(p=>({...p,[k]:v}));const ug=(k,v)=>setGf(p=>({...p,[k]:v}));
  const tabs=[{id:"res",label:"Reservierung",icon:<I n="file" s={15}/>},{id:"guest",label:"Gast",icon:<I n="user" s={15}/>},{id:"payment",label:"Zahlung",icon:<I n="credit" s={15}/>},{id:"room",label:"Zimmer",icon:<I n="bed" s={15}/>}];

    {modal?.type==="editUT"&&<UTEditor ut={modal.ut} usedColors={uts.map(u=>u.color)} onClose={()=>setModal(null)} onSave={async d=>{await saveUT(d,modal.ut.id);setModal(null)}}/>}
    {modal?.type==="addRoom"&&<RoomEditor unitTypes={uts} onClose={()=>setModal(null)} onSave={async d=>{await saveRoom({...d,unit_type_id:modal.pre||d.unit_type_id});setModal(null)}}/>}
    {modal?.type==="editRoom"&&<RoomEditor room={modal.room} unitTypes={uts} onClose={()=>setModal(null)} onSave={async d=>{await saveRoom(d,modal.room.id);setModal(null)}}/>}
  </div>};

  // ─── PRODUKTE ───
  const ProductsView=({api:a,products:prods,onRefresh:ref,showToast:sh})=>{const[modal,setModal]=useState(null);const saveProd=async(d,id)=>{try{if(id)await a.patch("products",id,d);else await a.post("products",d);await ref();sh(id?"Aktualisiert":"Angelegt");setModal(null)}catch(e){sh(e.message,"error")}};const delProd=async id=>{try{await a.del("products",id);await ref();sh("Geloescht")}catch(e){sh(e.message,"error")}};return<div><div style={{display:"flex",justifyContent:"space-between",marginBottom:16}}><span style={{color:"#6B7280"}}>{prods.length} Produkte</span><Btn sz="sm" onClick={()=>setModal({type:"add"})}><I n="plus" s={14}/> Neues Produkt</Btn></div><div style={{background:"#fff",borderRadius:12,border:"1px solid #E5E7EB",overflow:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}><thead><tr style={{background:"#F9FAFB"}}>{["Produkt","Kategorie","Einheit","Preis","MwSt.","Status",""].map(h=><th key={h} style={{padding:"10px 12px",textAlign:"left",fontWeight:600,fontSize:11,color:"#6B7280",borderBottom:"1px solid #E5E7EB"}}>{h}</th>)}</tr></thead><tbody>{prods.map(p=><tr key={p.id} style={{opacity:p.active?1:.5,borderBottom:"1px solid #F3F4F6"}}><td style={{padding:"10px 12px"}}><div style={{fontWeight:600}}>{p.name}</div>{p.description&&<div style={{fontSize:11,color:"#6B7280"}}>{p.description}</div>}</td><td style={{padding:"10px 12px"}}>{p.category}</td><td style={{padding:"10px 12px"}}>{p.unit}</td><td style={{padding:"10px 12px",fontWeight:600}}>{parseFloat(p.price)>0?"EUR "+fmt(p.price):"Gratis"}</td><td style={{padding:"10px 12px",fontSize:11}}>{(p.tax_type||"einfach")==="gemischt"?<span style={{color:"#8B5CF6"}}>{p.tax_split_1_pct}%x{p.tax_split_1_rate}% + {p.tax_split_2_pct}%x{p.tax_split_2_rate}%</span>:<span>{p.tax_rate||7}%</span>}</td><td style={{padding:"10px 12px",fontSize:11,fontWeight:600,color:p.active?"#059669":"#9CA3AF"}}>{p.active?"Aktiv":"Inaktiv"}</td><td style={{padding:"10px 12px"}}><div style={{display:"flex",gap:4}}><button onClick={()=>setModal({type:"edit",prod:p})} style={{background:"none",border:"none",cursor:"pointer",color:"#6B7280"}}><I n="edit" s={15}/></button><button onClick={()=>delProd(p.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#EF4444"}}><I n="trash" s={15}/></button></div></td></tr>)}</tbody></table></div>{modal&&<ProductEditor prod={modal.prod} onClose={()=>setModal(null)} onSave={saveProd}/>}</div>};
  const ProductEditor=({prod,onClose,onSave})=>{const[fm,setFm]=useState(prod?{...prod}:{name:"",description:"",price:0,unit:"pro Nacht",category:"sonstige",active:true});const u=(k,v)=>setFm(p=>({...p,[k]:v}));const[sv,setSv]=useState(false);return<Modal title={prod?"Produkt bearbeiten":"Neues Produkt"} onClose={onClose} width={440}><Inp label="Name *" value={fm.name} onChange={e=>u("name",e.target.value)}/><Inp label="Beschreibung" value={fm.description} onChange={e=>u("description",e.target.value)}/><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}><Inp label="Preis (EUR)" type="number" min={0} value={fm.price} onChange={e=>u("price",parseFloat(e.target.value)||0)}/><Sel label="Einheit" value={fm.unit} onChange={e=>u("unit",e.target.value)}><option value="pro Nacht">pro Nacht</option><option value="pro Aufenthalt">pro Aufenthalt</option><option value="pro Person">pro Person</option><option value="pro Person/Nacht">pro Person/Nacht</option><option value="einmalig">einmalig</option></Sel></div><Sel label="Kategorie" value={fm.category} onChange={e=>u("category",e.target.value)}><option value="verpflegung">Verpflegung</option><option value="service">Service</option><option value="parkplatz">Parkplatz</option><option value="wellness">Wellness</option><option value="sonstige">Sonstige</option></Sel><label style={{display:"flex",alignItems:"center",gap:8,marginBottom:16,cursor:"pointer"}}><input type="checkbox" checked={fm.active} onChange={()=>u("active",!fm.active)}/><span style={{fontSize:13,fontWeight:600}}>Aktiv</span></label><div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><Btn v="ghost" onClick={onClose}>Abbrechen</Btn><Btn disabled={!fm.name||sv} onClick={async()=>{setSv(true);await onSave(fm,prod?.id);setSv(false)}}><I n="save" s={14}/> {prod?"Speichern":"Anlegen"}</Btn></div></Modal>};

  // ─── DASHBOARD ───
  const Dashboard=()=>{const s=useMemo(()=>({rooms:aRms.length,types:uts.length,ang:ress.filter(r=>r.status==="angebot").length,res:ress.filter(r=>r.status==="reservierung").length,ein:ress.filter(r=>r.status==="checkedin").length,umsatz:ress.filter(r=>["reservierung","checkedin","checkedout"].includes(r.status)).reduce((s,r)=>s+parseFloat(r.total_price||0),0),gaeste:guests.length}),[aRms,uts,ress,guests]);return<div><div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:12,marginBottom:24}}>{[{l:"Zimmer",v:s.rooms,ic:"bed",c:"#6366F1"},{l:"Angebote",v:s.ang,ic:"send",c:"#F59E0B"},{l:"Reservierungen",v:s.res,ic:"cal",c:"#3B82F6"},{l:"Eingecheckt",v:s.ein,ic:"check",c:"#10B981"},{l:"Umsatz",v:s.umsatz.toFixed(0)+" EUR",ic:"credit",c:"#8B5CF6"},{l:"Gaeste",v:s.gaeste,ic:"users",c:"#EC4899"}].map((c,i)=><div key={i} style={{background:"#fff",borderRadius:12,padding:16,border:"1px solid #E5E7EB"}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span style={{fontSize:12,color:"#6B7280"}}>{c.l}</span><I n={c.ic} s={20} c={c.c}/></div><div style={{fontSize:22,fontWeight:800}}>{c.v}</div></div>)}</div><div style={{background:"#fff",borderRadius:12,padding:16,border:"1px solid #E5E7EB"}}><h3 style={{margin:"0 0 12px",fontWeight:700,fontSize:14}}>Letzte Reservierungen</h3>{ress.slice(0,8).map(r=>{const rm=rms.find(x=>x.id===r.room_id);const g=gMap[r.guest_id];return<div key={r.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid #F3F4F6"}}><div><div style={{fontWeight:600,fontSize:13}}>{g?g.first_name+" "+g.last_name:"..."}</div><div style={{fontSize:11,color:"#9CA3AF"}}>Zi. {rm?.name} - {fd(r.check_in)} - {SOURCES[r.source]||""}</div></div><Badge s={r.status}/></div>})}</div></div>};

  if(ld)return<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}><I n="clock" s={32} c="#3B82F6" st={{animation:"spin 1s linear infinite"}}/></div>;

  const nav=[{id:"dashboard",l:"Dashboard",ic:"chart"},{id:"plan",l:"Belegungsplan",ic:"cal"},{id:"preiskategorie",l:"Preiskategorie",ic:"dollar"},{id:"guests",l:"Gaeste",ic:"users"},{id:"settings",l:"Einstellungen",ic:"settings"}];

  return<div style={{minHeight:"100vh"}}>
    <div style={{background:"#fff",borderBottom:"1px solid #E5E7EB",padding:"12px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
      <div style={{display:"flex",alignItems:"center",gap:12}}><div style={{background:"linear-gradient(135deg,#3B82F6,#8B5CF6)",borderRadius:10,width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center"}}><I n="home" s={20} c="#fff"/></div><div><div style={{fontWeight:800,fontSize:16}}>{hi?.name||"Hotel"}</div><div style={{fontSize:11,color:"#9CA3AF"}}>{uts.length} Einheiten - {aRms.length} Zimmer - {guests.length} Gaeste</div></div></div>
      <div style={{display:"flex",gap:4,alignItems:"center",flexWrap:"wrap"}}>{nav.map(n=><button key={n.id} onClick={()=>setView(n.id)} style={{display:"flex",alignItems:"center",gap:6,padding:"8px 14px",borderRadius:8,border:"none",background:view===n.id?"#EFF6FF":"transparent",color:view===n.id?"#2563EB":"#6B7280",fontWeight:view===n.id?700:500,fontSize:13,cursor:"pointer"}}><I n={n.ic} s={18}/> {n.l}</button>)}<button onClick={load} style={{background:"none",border:"none",cursor:"pointer",padding:8,color:"#9CA3AF"}} title="Neu laden"><I n="refresh" s={16}/></button><button onClick={onLogout} style={{background:"none",border:"none",cursor:"pointer",padding:8,color:"#9CA3AF"}} title="Abmelden"><I n="logout" s={16}/></button></div>
    </div>
    <div style={{padding:20,maxWidth:1200,margin:"0 auto"}}>
      {view==="dashboard"&&<Dashboard/>}
      {view==="plan"&&<PlanView/>}
      {view==="preiskategorie"&&<PreiskategorieView/>}
      {view==="guests"&&<GuestsView/>}
      {view==="settings"&&<SettingsView/>}
    </div>
    {toast&&<div style={{position:"fixed",bottom:24,right:24,background:toast.t==="success"?"#10B981":"#EF4444",color:"#fff",padding:"12px 20px",borderRadius:12,fontWeight:600,fontSize:14,boxShadow:"0 10px 25px rgba(0,0,0,.15)",zIndex:2000,animation:"slideIn .3s ease"}}>{toast.m}</div>}
  </div>;
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
